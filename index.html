<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AAG 🔥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ctext y='50%' x='50%' text-anchor='middle' dominant-baseline='middle' font-size='120' fill='%23FF6600'%3E🔥%3C/text%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none; /* blocks pinch zoom */
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .player-container {
            background: #000;
            position: relative;
            height: calc(100vh - 76px);
            overflow: hidden;
        }
        
        .crop-wrapper {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        
        .crop-wrapper iframe {
            position: absolute;
            width: 200%;          /* makes sides smaller in view */
            height: 160%;         /* makes top/bottom smaller in view */
            left: -50%;           /* centers the video (hides left ad + right chat) */
            top: -18%;            /* hides top CricHD bar */
            border: 0;
            filter: contrast(1.08) saturate(1.05);
        }
        
        /* No user zoom / scroll */
        html, body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- AAG Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-black/95 backdrop-blur-xl border-b border-orange-600/30">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-orange-500 rounded-2xl flex items-center justify-center text-4xl shadow-lg">🔥</div>
                <div>
                    <h1 class="logo-font text-3xl font-bold tracking-tighter">AAG</h1>
                    <p class="text-[10px] text-orange-400 -mt-1 tracking-widest font-mono">LIVE</p>
                </div>
            </div>
            <div class="flex items-center gap-4 text-xs font-mono">
                <div class="flex items-center gap-2 bg-green-500/10 px-4 py-1 rounded-3xl border border-green-500/30">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    LIVE
                </div>
                <button onclick="toggleFullscreen()" 
                        class="bg-white/10 hover:bg-white/20 px-5 py-2 rounded-3xl flex items-center gap-2 text-sm">
                    FULLSCREEN
                </button>
            </div>
        </div>
    </header>

    <!-- Cropped Video Player (ONLY the exact video area visible) -->
    <div class="player-container pt-[76px]">
        <div class="crop-wrapper">
            <iframe 
                id="mainPlayer"
                src="https://dadocric.st/player.php?id=starsp3"
                allowfullscreen
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                sandbox="allow-scripts allow-same-origin allow-presentation"
                scrolling="no">
            </iframe>
        </div>
    </div>

    <script>
        // Loader
        const loader = document.createElement('div');
        loader.innerHTML = `
            <div class="absolute inset-0 bg-black/80 flex items-center justify-center z-50">
                <div class="text-center">
                    <div class="w-14 h-14 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    <p class="mt-5 text-orange-300 text-xs tracking-[2px] font-mono">LOADING AAG STREAM...</p>
                </div>
            </div>`;
        document.body.appendChild(loader);

        document.getElementById('mainPlayer').onload = () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 600);
            }, 1000);
        };

        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'f') toggleFullscreen();
            if (e.key.toLowerCase() === 'r') location.reload();
        });

        // Block all redirects & popups (already in sandbox)
        console.log('%cAAG 🔥 - Video zoomed exactly | Redirects blocked | User zoom disabled', 'color:#FF6600; font-family:monospace');
    </script>
</body>
</html>
